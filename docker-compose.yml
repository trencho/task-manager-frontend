services:
  vue:
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: vue
    deploy:
      replicas: 1
    expose:
      - 8080
    environment:
      NODE_ENV: production
    image: task-manager-vue:latest
    networks:
      - network
    ports:
      - "8080:80"

networks:
  network:
    attachable: true
    # `overlay` is a swarm-mode driver: `docker compose up` on a plain daemon fails
    # at network creation with "This node is not a swarm manager".
    driver: bridge
