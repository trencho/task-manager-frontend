services:
  vue:
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: vue
    deploy:
      replicas: 1
    expose:
      - 8080
    environment:
      # Where nginx forwards /api. The default names the backend compose project's `spring`
      # service, which only resolves when both stacks share a network -- run this stack with
      # BACKEND_URL pointing at wherever the API actually lives.
      BACKEND_URL: ${BACKEND_URL:-http://spring:80}
    image: task-manager-vue:latest
    networks:
      - network
    ports:
      - "8080:80"

networks:
  network:
    attachable: true
    # `overlay` is a swarm-mode driver: `docker compose up` on a plain daemon fails
    # at network creation with "This node is not a swarm manager".
    driver: bridge
