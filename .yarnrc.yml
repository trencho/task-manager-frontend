# Yarn Berry (4.x) is Corepack-managed via the "packageManager" field in package.json —
# no Yarn binary is committed to .yarn/releases.
#
# nodeLinker: node-modules keeps a conventional node_modules/ tree instead of Plug'n'Play,
# so Vite, vue-tsc and Vitest resolve dependencies exactly as they did under npm.
nodeLinker: node-modules
