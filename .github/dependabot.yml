version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # One PR per week for the routine bumps, instead of five that each need a CI run.
      minor-and-patch:
        update-types: [minor, patch]
    ignore:
      # eslint-plugin-vue 10 requires ESLint 9+ and flat config. Move both together,
      # deliberately, not through an automated PR.
      - dependency-name: "eslint"
        update-types: [version-update:semver-major]
      - dependency-name: "eslint-plugin-vue"
        update-types: [version-update:semver-major]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
